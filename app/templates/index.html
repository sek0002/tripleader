<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MUUC Trip Leader App</title>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("muuc-theme") || "light";
    </script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>MUUC Trip Leader App</h1>
          <p id="syncStatus">Preparing purchase store...</p>
          <p id="dateRangeStatus">Available date range: checking data...</p>
        </div>
        <div class="topActions">
          <button id="refreshButton" type="button">Refresh</button>
          <div class="menuWrap">
            <button id="menuButton" class="menuButton secondaryButton" type="button" aria-expanded="false" aria-controls="pageMenu">Menu</button>
            <div id="pageMenu" class="pageMenu hidden">
              <button class="themeToggle menuItem" type="button" data-theme-toggle aria-label="Switch to dark mode">Dark</button>
              <form method="post" action="/logout">
                <button class="menuItem" type="submit">Logout</button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <section class="lookup">
        <label for="nameInput">Name</label>
        <div class="searchRow">
          <div class="autocompleteWrap">
            <input id="nameInput" type="text" autocomplete="off" placeholder="Start typing a member name" aria-autocomplete="list" aria-controls="nameSuggestions">
            <div id="nameSuggestions" class="nameSuggestions hidden" role="listbox"></div>
          </div>
          <button id="searchButton" type="button">Search</button>
        </div>
      </section>

      <section id="emptyState" class="empty">Select a name to view emergency contact and purchase details.</section>

      <section id="memberPanel" class="hidden">
        <div class="panel">
          <h2 id="memberName"></h2>
          <div class="grid emergencyGrid">
            <div>
              <span>Email</span>
              <strong id="memberEmail"></strong>
            </div>
            <div>
              <span>Emergency contact</span>
              <strong id="emergencyName"></strong>
            </div>
            <div>
              <span>Relationship</span>
              <strong id="emergencyRelationship"></strong>
            </div>
            <div>
              <span>Phone</span>
              <strong id="emergencyPhone"></strong>
            </div>
            <div>
              <span>Alternate phone</span>
              <strong id="emergencyPhone2"></strong>
            </div>
          </div>
        </div>

        <div class="panel filterPanel">
          <div>
            <label for="purchaseSearchInput">Search purchases</label>
            <input id="purchaseSearchInput" type="search" autocomplete="off" placeholder="Search date, paid status, total, or item">
          </div>
          <div>
            <label for="categoryFilter">Category</label>
            <select id="categoryFilter">
              <option value="">All categories</option>
            </select>
          </div>
          <div>
            <label for="monthYearFilter">Month / Year</label>
            <select id="monthYearFilter">
              <option value="">All months</option>
            </select>
          </div>
          <div>
            <label for="paidFilter">Paid status</label>
            <select id="paidFilter">
              <option value="">All statuses</option>
              <option value="YES">Paid</option>
              <option value="NO">Unpaid</option>
            </select>
          </div>
          <button id="clearFiltersButton" class="secondaryButton" type="button">Clear</button>
        </div>

        <section id="filterEmptyState" class="empty hidden">No purchase rows match the current filters.</section>
        <div id="purchaseGroups" class="purchaseGroups"></div>
      </section>
    </main>

    <script src="/static/theme.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
