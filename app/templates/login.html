<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | MUUC Trip Organiser App</title>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("muuc-theme") || "dark";
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=79">
  </head>
  <body class="loginPage">
    <button class="themeToggle floatingThemeToggle" type="button" data-theme-toggle aria-label="Switch to dark mode">Dark</button>
    <main class="loginShell">
      <section class="loginPanel">
        <h1>MUUC Trip Organiser App</h1>
        <form method="post" action="/login">
          <label for="pin">PIN</label>
          <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
          {% if error %}
            <p class="loginError">{{ error }}</p>
          {% endif %}
          <button type="submit">Login</button>
        </form>
        <nav class="loginQuickLinks" aria-label="Quick forms">
          <a class="buttonLink secondaryButton" href="https://forms.gle/WjdJsYN9Qrv1iahY9" target="_blank" rel="noopener noreferrer">Gear Hire</a>
          <a class="buttonLink secondaryButton" href="https://forms.gle/R2cN92bEKPkcdBqh8" target="_blank" rel="noopener noreferrer">Trip Report</a>
        </nav>
      </section>
    </main>
    <script src="/static/theme.js?v=79"></script>
  </body>
</html>
