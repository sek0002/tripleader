<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | MUUC Purchase Lookup</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="loginPage">
    <main class="loginShell">
      <section class="loginPanel">
        <h1>MUUC Purchase Lookup</h1>
        <form method="post" action="/login">
          <label for="pin">PIN</label>
          <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
          {% if error %}
            <p class="loginError">{{ error }}</p>
          {% endif %}
          <button type="submit">Login</button>
        </form>
      </section>
    </main>
  </body>
</html>
