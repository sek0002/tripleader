<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | MUUC Trip Leader App</title>
    <script>
      document.documentElement.dataset.theme = localStorage.getItem("muuc-theme") || "dark";
    </script>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="loginPage">
    <button class="themeToggle floatingThemeToggle" type="button" data-theme-toggle aria-label="Switch to dark mode">Dark</button>
    <main class="loginShell">
      <section class="loginPanel">
        <h1>MUUC Trip Leader App</h1>
        <form method="post" action="/login">
          <label for="pin">PIN</label>
          <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
          {% if error %}
            <p class="loginError">{{ error }}</p>
          {% endif %}
          <button type="submit">Login</button>
        </form>
      </section>
    </main>
    <script src="/static/theme.js"></script>
  </body>
</html>
